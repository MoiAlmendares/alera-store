    function esc(str) {
      if (str == null) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    function cartItemCount() {
      try {
        const raw = localStorage.getItem('alera_cart');
        if (!raw) return 0;
        const parsed = JSON.parse(raw);
        const items = (parsed && parsed.items) ? parsed.items : (parsed || {});
        return Object.values(items).reduce((s, q) => s + (Number(q) || 0), 0);
      } catch { return 0; }
    }

    function refreshCartBadge() {
      const badge = document.getElementById('cart-badge');
      const count = cartItemCount();
      if (count > 0) {
        badge.textContent = count;
        badge.classList.remove('hidden');
        badge.classList.add('flex');
      } else {
        badge.classList.add('hidden');
        badge.classList.remove('flex');
      }
    }

    function plusIcon() {
      return `<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>`;
    }

    function showError() {
      document.getElementById('skeleton-wrap').classList.add('hidden');
      document.getElementById('error-wrap').classList.remove('hidden');
    }

    function setMainImg(src, alt) {
      const img = document.getElementById('main-img');
      img.onerror = () => {
        img.onerror = null;
        img.parentElement.innerHTML = `
          <div class="w-full h-full flex items-center justify-center text-zinc-300 text-xs font-mono uppercase tracking-widest">// sin foto</div>`;
      };
      img.src = src;
      img.alt = alt;
    }

    function renderThumbs(imgs, name) {
      if (imgs.length <= 1) return;
      const row = document.getElementById('thumbs-row');
      row.classList.remove('hidden');
      row.innerHTML = imgs.map((src, i) => `
        <button class="thumb${i === 0 ? ' active' : ''} w-16 h-16 rounded-xl overflow-hidden shrink-0 border border-zinc-100" data-index="${i}">
          <img src="${esc(src)}" alt="${esc(name)}" class="w-full h-full object-cover" onerror="this.parentElement.style.display='none'" />
        </button>
      `).join('');
      row.querySelectorAll('.thumb').forEach(btn => {
        btn.addEventListener('click', () => selectThumb(btn, imgs[Number(btn.dataset.index)]));
      });
    }

    function selectThumb(btn, src) {
      document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      setMainImg(src, document.getElementById('name-el').textContent);
    }

    function addToCartAndFeedback(p) {
      const btn = document.getElementById('add-btn');
      const raw = localStorage.getItem('alera_cart');
      const parsed = raw ? JSON.parse(raw) : {};
      const items = (parsed && parsed.items) ? parsed.items : (parsed || {});
      items[p.id] = (items[p.id] || 0) + 1;
      localStorage.setItem('alera_cart', JSON.stringify({ items, ts: Date.now() }));

      refreshCartBadge();
      showCartBar();

      btn.innerHTML = `✓ Agregado al carrito`;
      btn.disabled = true;
      btn.classList.add('opacity-80');

      setTimeout(() => {
        btn.disabled = false;
        btn.classList.remove('opacity-80');
        btn.innerHTML = `${plusIcon()} Agregar al carrito — L ${p.price}`;
      }, 2000);
    }

    function showCartBar() {
      const bar = document.getElementById('cart-bar');
      const total = cartSubtotal();
      document.getElementById('cart-bar-label').textContent = 'Ver carrito · L ' + total;
      bar.classList.remove('hidden');
      bar.classList.add('flex');
    }

    function cartSubtotal() {
      try {
        const raw = localStorage.getItem('alera_cart');
        if (!raw) return 0;
        const parsed = JSON.parse(raw);
        const items = (parsed && parsed.items) ? parsed.items : (parsed || {});
        const byId = {};
        [...DEFAULT_PRODUCTS_LIST, ...(window._prodList || [])].forEach(pr => { byId[Number(pr.id)] = pr; });
        return Object.entries(items).reduce((s, [id, q]) => {
          const pr = byId[Number(id)];
          return s + (pr ? pr.price * (Number(q) || 0) : 0);
        }, 0);
      } catch { return 0; }
    }

    async function loadProduct() {
      const params = new URLSearchParams(location.search);
      const idParam = params.get('id');
      if (!idParam) { showError(); return; }
      const targetId = Number(idParam);

      let product = null;
      try {
        const r = await fetch(API + '/products');
        if (!r.ok) throw new Error('fetch failed');
        const data = await r.json();
        window._prodList = data;
        product = data.find(p => Number(p.id) === targetId);
      } catch (e) {
        // Sin conexión / API caída: usar lista default como fallback.
      }
      if (!product) {
        product = DEFAULT_PRODUCTS_LIST.find(p => Number(p.id) === targetId);
      }

      if (!product) { showError(); return; }

      const p = product;
      const available = p.active !== false && p.stock !== false;

      // Update meta
      const pageUrl = location.origin + location.pathname + '?id=' + idParam;
      document.getElementById('page-title').textContent    = p.name + ' — Alera';
      document.getElementById('page-desc').content         = (p.desc || '') + ' | Alera Store Honduras.';
      document.getElementById('og-title').content          = p.name + ' — Alera';
      document.getElementById('og-desc').content           = p.desc || '';
      document.getElementById('og-url').content            = pageUrl;
      document.getElementById('canonical-url').href        = pageUrl;
      if (p.img) document.getElementById('og-image').content = p.img;
      // JSON-LD structured data
      document.getElementById('json-ld').textContent = JSON.stringify({
        '@context': 'https://schema.org',
        '@type': 'Product',
        name: p.name,
        description: p.desc || '',
        image: p.img || '',
        url: pageUrl,
        offers: {
          '@type': 'Offer',
          priceCurrency: 'HNL',
          price: p.price,
          availability: !available
            ? 'https://schema.org/OutOfStock'
            : 'https://schema.org/InStock',
        },
      });

      // Gallery
      const imgs = Array.isArray(p.imgs) && p.imgs.length > 0 ? p.imgs : (p.img ? [p.img] : []);
      if (imgs.length > 0) {
        setMainImg(imgs[0], p.name);
        renderThumbs(imgs, p.name);
      } else {
        document.getElementById('main-img').parentElement.innerHTML = `
          <div class="w-full h-full flex items-center justify-center text-zinc-300 text-xs font-mono uppercase tracking-widest">// sin foto</div>`;
      }

      // Badge
      if (p.badge) {
        const badgeEl = document.getElementById('badge-el');
        badgeEl.textContent = p.badge;
        badgeEl.classList.remove('hidden');
      }

      // Texts
      document.getElementById('fandom-el').textContent = p.fandom || '';
      document.getElementById('name-el').textContent = p.name;
      document.getElementById('price-el').textContent = 'L ' + p.price;
      document.getElementById('desc-el').textContent = p.desc || '';

      // Add button
      const btn = document.getElementById('add-btn');
      if (!available) {
        btn.textContent = p.active === false ? 'No disponible' : 'Agotado';
        btn.disabled = true;
      } else {
        btn.innerHTML = `${plusIcon()} Agregar al carrito — L ${p.price}`;
        btn.onclick = () => addToCartAndFeedback(p);
      }

      // WhatsApp flotante: consulta sobre este producto
      const wa = document.getElementById('wa-float');
      wa.href = 'https://wa.me/50498822321?text=' +
        encodeURIComponent('Hola! Me interesa el producto "' + p.name + '" (L ' + p.price + '). ¿Está disponible?');

      // Badge del carrito (por si ya hay items de una visita previa)
      refreshCartBadge();

      // Meta Pixel: ViewContent
      if (typeof fbq === 'function') {
        fbq('track', 'ViewContent', {
          content_ids: [idParam],
          content_name: p.name,
          value: p.price,
          currency: 'HNL',
        });
      }

      // Show content
      document.getElementById('skeleton-wrap').classList.add('hidden');
      document.getElementById('product-wrap').classList.remove('hidden');
    }

    loadProduct();
  </script>
</body>
</html>
